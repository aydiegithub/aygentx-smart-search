name: Deploy AygentX to AWS Lambda via SAM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write  # Require for OIDC
      contents: read   # Allows actions/checkout to read code

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies and generate Requirements.txt
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv export --no-hashes > requirements.txt

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      # You can use AWS OIDC GitHub Actions module or normal AWS Access Keys.
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # e.g. us-east-1

      - name: SAM Build
        run: sam build --use-container

      - name: SAM Deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name aygentx-smart-search \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
                ApiSecretKey="${{ secrets.API_SECRET_KEY }}" \
                GeminiApiKey="${{ secrets.GEMINI_API_KEY }}" \
                OpenaiApiKey="${{ secrets.OPENAI_API_KEY }}" \
                CloudflareDatabaseId="${{ secrets.CLOUDFLARE_DATABASE_ID }}" \
                CloudflareAccountId="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" \
                CloudflareApiToken="${{ secrets.CLOUDFLARE_API_TOKEN }}"
